<mat-toolbar color="primary" class="app-toolbar">
  <a routerLink="/" class="brand">
    <mat-icon>school</mat-icon>
    <span class="brand-text">Zürichdeutsch</span>
  </a>

  <span class="spacer"></span>

  <nav class="nav-links">
    <a mat-button color="primary" routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
      <mat-icon>list</mat-icon>
      <span class="nav-label">Vokabeln</span>
    </a>
    <a mat-button color="primary" routerLink="/training" routerLinkActive="active-link">
      <mat-icon>fitness_center</mat-icon>
      <span class="nav-label">Training</span>
    </a>
    <a mat-button color="primary" routerLink="/settings" routerLinkActive="active-link">
      <mat-icon>settings</mat-icon>
      <span class="nav-label">Einstellungen</span>
    </a>
  </nav>
</mat-toolbar>

<main>
  <router-outlet />
</main>
