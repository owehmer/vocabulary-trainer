<div class="page-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ isEdit ? 'Vokabel bearbeiten' : 'Neue Vokabel' }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Deutsch</mat-label>
        <input matInput [value]="german()" (input)="german.set($any($event.target).value)" placeholder="z.B. Fahrrad" />
      </mat-form-field>

      <div class="swiss-row">
        <mat-form-field appearance="outline" class="swiss-field">
          <mat-label>Zürichdeutsch</mat-label>
          <input matInput [value]="swissGerman()" (input)="swissGerman.set($any($event.target).value)" placeholder="z.B. Velo" />
        </mat-form-field>

        <button
          mat-stroked-button
          type="button"
          class="generate-btn"
          (click)="generate()"
          [disabled]="generating() || !claudeService.hasApiKey()"
          [matTooltip]="claudeService.hasApiKey() ? 'Übersetzung mit Claude generieren' : 'API-Key in Einstellungen hinterlegen'"
        >
          @if (generating()) {
            <mat-spinner diameter="18"></mat-spinner>
          } @else {
            <mat-icon>auto_awesome</mat-icon>
          }
          Generieren
        </button>
      </div>

      @if (!claudeService.hasApiKey()) {
        <p class="hint-text">
          <mat-icon class="hint-icon">info</mat-icon>
          Hinterlege einen Claude API-Key in den <a routerLink="/settings">Einstellungen</a>, um die automatische Übersetzung zu nutzen.
        </p>
      }
    </mat-card-content>
    <mat-card-actions align="end">
      <a mat-button routerLink="/">Abbrechen</a>
      <button mat-flat-button color="primary" (click)="save()" [disabled]="!german().trim() || !swissGerman().trim()">
        <mat-icon>save</mat-icon>
        Speichern
      </button>
    </mat-card-actions>
  </mat-card>
</div>
