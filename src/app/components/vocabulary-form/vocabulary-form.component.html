<div class="page-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ isEdit ? 'Vokabel bearbeiten' : 'Neue Vokabel' }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Deutsch</mat-label>
        <input matInput [value]="german()" (input)="german.set($any($event.target).value)" placeholder="z.B. Fahrrad" />
      </mat-form-field>

      <div class="swiss-row">
        <mat-form-field appearance="outline" class="swiss-field">
          <mat-label>Zürichdeutsch</mat-label>
          <input matInput [value]="swissGerman()" (input)="swissGerman.set($any($event.target).value)" placeholder="z.B. Velo" />
        </mat-form-field>

        <button
          mat-stroked-button
          type="button"
          class="translate-btn"
          (click)="translate()"
          [disabled]="generating() || !translationManager.isAvailable()"
          matTooltip="Übersetzung"
        >
          @if (generating()) {
            <mat-spinner diameter="18"></mat-spinner>
          } @else {
            <mat-icon>translate</mat-icon>
          }
          Übersetzen
        </button>

        <button
          mat-icon-button
          type="button"
          class="speak-btn"
          (click)="speakSwissGerman()"
          [disabled]="!swissGerman().trim()"
          matTooltip="Aussprechen"
        >
          <mat-icon>{{ ttsManager.isSpeaking() ? 'stop' : 'volume_up' }}</mat-icon>
        </button>
      </div>
    </mat-card-content>
    <mat-card-actions align="end">
      <a mat-button routerLink="/">Abbrechen</a>
      <button mat-flat-button color="primary" (click)="save()" [disabled]="!german().trim() || !swissGerman().trim()">
        <mat-icon>save</mat-icon>
        Speichern
      </button>
    </mat-card-actions>
  </mat-card>
</div>
